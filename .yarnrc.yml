compressionLevel: mixed

enableGlobalCache: false

logFilters:
    - code: YN0013
      level: discard

nodeLinker: node-modules
npmMinimalAgeGate: 1440 # 24 hours
npmPreapprovedPackages:
    - "@rolldown/*"
    - "@typescript/*"
    - react
    - react-dom
    - rolldown
    - typescript
    - vite
    - vitest
enableScripts: false
