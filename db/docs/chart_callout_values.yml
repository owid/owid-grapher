metadata:
    description: |
        Stores precomputed GrapherValuesJson payloads for data-callout blocks so we can serve pages without recomputing chart values on the fly. Entries are keyed by the normalized callout URL (path plus query string, no domain), including the entity in the query.
fields:
    id:
        description: Normalized callout URL, e.g. /grapher/life-expectancy?country=ESP
    value:
        description: GrapherValuesJson payload for the callout, serialized as JSON
    createdAt:
        description: Timestamp when the cached callout value was created
    updatedAt:
        description: Timestamp when the cached callout value was last refreshed
