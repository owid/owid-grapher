metadata:
  description: This table contains our 'standalone' grapher charts, i.e. the charts that are shown on our website at https://ourworldindata.org/grapher/SLUG. Charts represent data visualizations that can be embedded in articles, shared publicly, or used in explorers. Charts use an inheritance system where they can inherit configuration from parent variables.
  incoming_foreign_keys:
    - table: chart_diff_approvals
      column: chartId
    - table: chart_diff_conflicts
      column: chartId
    - table: chart_dimensions
      column: chartId
    - table: chart_slug_redirects
      column: chart_id
    - table: chart_tags
      column: chartId
    - table: charts_x_entities
      column: chartId
    - table: explorer_charts
      column: chartId
    - table: narrative_charts
      column: parentChartId
    - table: related_charts
      column: chartId
    - table: related_charts
      column: relatedChartId
fields:
  id:
    description: |
      Internal auto-increment identifier for the chart. Note that these ids are minted independently per environment (production, staging servers, dev machines), so the same numeric id can refer to different charts on different servers. For referencing charts from external systems, prefer the chart's config UUID (see configId).
  configId:
    description: |
      Foreign key to chart_configs table. Charts store their configuration separately to enable inheritance and efficient updates. The chart_configs table contains the actual config, the slug of the chart etc., so in many queries, these two tables have to be joined.

      This column is also the chart's stable external identity, and for many applications the preferred identifier for referencing a chart. It is a client-generated UUIDv7, unique per chart, assigned once at creation and — by invariant — never changed over the chart's lifetime (chart updates modify the chart_configs row in place, they never swap it). Unlike the numeric id it does not collide across environments (copies of the production database keep the same UUIDs, and chart-sync carries it along when syncing staging charts to production), and unlike the slug it exists for unpublished charts and never changes. The admin API accepts this UUID wherever a :chartId route param is expected, and the ETL uses it to reference charts. Code that replaces a chart's config row instead of updating it in place would break this invariant and must not be written.
  isInheritanceEnabled:
    description: When true, chart inherits configuration from parent variable's grapherConfigIdAdmin or grapherConfigIdETL. This allows variables to define default chart settings that are automatically applied to all inheriting charts.
  forceDatapage:
    description: When true, force rendering this chart as a data page using metadata from the first Y indicator.
  createdAt:
    description: Timestamp when the chart was created
  updatedAt:
    description: Timestamp when the chart was last updated
  lastEditedAt:
    description: Timestamp when the chart was last edited by a user (not system updates)
  publishedAt:
    description: Timestamp when the chart was published. NULL if never published. Published charts are publicly accessible.
  lastEditedByUserId:
    description: Foreign key to users table. Tracks who last made substantive edits to the chart.
  publishedByUserId:
    description: Foreign key to users table. Tracks who published the chart.
