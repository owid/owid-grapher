name: CI
on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  # Checks for prettify errors, TypeScript errors and runs vitest tests.
  "test-db":
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-yarn-deps

      - name: Install dependencies
        run: cp .env.example-grapher .env
        shell: bash

      - name: Build and run db tests
        run: make dbtest
        timeout-minutes: 6

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-yarn-deps

      - name: Run vitest
        run: yarn test --pool=forks

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Run typecheck
        run: yarn typecheck

  format:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Check formatting
        run: yarn testFormatAll

  oxlint:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Run oxlint
        run: yarn testLint

  raycast-snippets:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Check Raycast snippets are in sync
        run: yarn checkRaycastSnippets

  # Runs `bundlemon` on the code to see if our Vite build assets exceed a given file size.
  bundlemon:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-yarn-deps

      - name: Build
        run: yarn buildViteSite
        env:
          BUNDLEMON: true

      - name: BundleMon
        uses: lironer/bundlemon-action@4b47df0793e18e3899eeb07f19b7c88c92c2490e # v1.4.0

  zizmor:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          # Avanced Security mode is a bit too complicated for our use case, but
          # we might want to switch to it in the future.
          advanced-security: false
