name: CI
on:
  pull_request:
  push:
    branches:
      - master

# Cancel stale PR runs when new commits are pushed so CI capacity is spent on
# the latest revision. Keep master push runs uncancelled so every merged commit
# gets a complete validation run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Checks for prettify errors, TypeScript errors and runs vitest tests.
  "test-db":
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-yarn-deps

      - name: Install dependencies
        run: cp .env.example-grapher .env
        shell: bash

      - name: Build and run db tests
        run: make dbtest
        timeout-minutes: 6

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-yarn-deps

      - name: Run vitest
        run: yarn test --pool=forks

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Run typecheck
        run: yarn typecheck

  format:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Check formatting
        run: yarn testFormatAll

  oxlint:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Run oxlint
        run: yarn testLint

  # Runs `bundlemon` on the code to see if our Vite build assets exceed a given file size.
  bundlemon:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-yarn-deps

      - name: Build
        run: yarn buildViteSite
        env:
          BUNDLEMON: true

      - name: BundleMon
        uses: lironer/bundlemon-action@v1
