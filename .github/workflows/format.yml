name: Format
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

# Runs `oxfmt` on a pull request so everything is nice and formatted!
# If something's wrong, a new commit fixing the issues will automatically be pushed to the PR branch.

jobs:
  # Keep the committed component + template registries in sync when a sidecar
  # .md is edited (e.g. directly on master through the GitHub web editor), so
  # authors never have to run the generator locally. The generated JSON is
  # excluded from oxfmt (see .oxfmtrc.json). This is its own job, and `format`
  # waits on it (via `needs`) so the two don't both push to the same ref at
  # once.
  regenerate-gdocs-references:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      # The generator validates every archie example (components through
      # archieToEnriched, template documents through validateArchieMl) and
      # exits non-zero (writing nothing) if any example fails. On failure this
      # job goes red and the auto-commit step below is skipped, so the
      # committed registries are never corrupted — they just stay at their
      # last-good content. NOTE: there is no separate gate, so a broken example
      # pushed straight to master is not *blocked*, only surfaced as a red job;
      # the edit silently has no effect (stale JSON) until the example is fixed.
      - name: Regenerate gdocs references
        run: yarn generateGdocsReferences

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🤖 chore: regenerate gdocs registries"

  format:
    runs-on: ubuntu-latest
    needs: regenerate-gdocs-references

    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/setup-node-yarn-deps
        with:
          runPostinstallScripts: false

      - name: Run formatter
        run: yarn fixFormatAll

      - name: Commit formatting changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "🤖 style: format code"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$branch"
