<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demo — {{PROJECT}}</title>
        {{VITE_DEV_SCRIPTS}}
        <link rel="stylesheet" href="https://ourworldindata.org/fonts.css" />
        <link rel="stylesheet" href="/__bespoke/server/demo-grid.css" />
        <link rel="stylesheet" href="/__bespoke/server/component-demo.css" />
        {{DEV_ONLY_GLOBAL_CSS}}
    </head>
    <body>
        <h1 class="project-title">{{PROJECT}}</h1>
        <div id="demo-root"></div>
        <script type="module">
            import { mountBespokeComponentInShadow } from "/__bespoke/shared/bespokeComponentShadowDom.ts"
            import { VARIANTS } from "/{{PROJECT}}/{{ENTRYPOINT_JS}}"

            const SIZE_CLASSES = {
                narrow: "col-start-5 span-cols-6 col-md-start-3 span-md-cols-10 span-sm-cols-12 col-sm-start-2",
                wide: "col-start-4 span-cols-8 col-md-start-3 span-md-cols-10 span-sm-cols-12 col-sm-start-2",
                widest: "span-cols-12 col-start-2",
            }

            const root = document.getElementById("demo-root")
            for (const variant of VARIANTS) {
                const size = variant.demoSize ?? "wide"

                const wrapper = document.createElement("div")
                wrapper.className = "variant"
                wrapper.id = `variant--${variant.name}`

                const label = document.createElement("div")
                label.className = "variant-label"
                const prefix = document.createElement("span")
                prefix.className = "variant-label-prefix"
                prefix.textContent = "Variant:"
                const name = document.createElement("span")
                name.className = "variant-label-name"
                name.textContent = variant.name
                label.appendChild(prefix)
                label.appendChild(name)
                wrapper.appendChild(label)

                const gridContainer = document.createElement("div")
                gridContainer.className = "grid grid-cols-12-full-width"

                const gridCell = document.createElement("div")
                gridCell.className = SIZE_CLASSES[size] ?? SIZE_CLASSES.wide

                const container = document.createElement("div")
                gridCell.appendChild(container)
                gridContainer.appendChild(gridCell)
                wrapper.appendChild(gridContainer)
                root.appendChild(wrapper)

                mountBespokeComponentInShadow({
                    container,
                    scriptUrl: "/{{PROJECT}}/{{ENTRYPOINT_JS}}",
                    cssUrl: "{{CSS_URL}}" || undefined,
                    variant: variant.name,
                    config: variant.demoConfig,
                })
            }
        </script>
    </body>
</html>
