<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demo — {{PROJECT}}</title>
        <script type="module">
            // We just assume that this project needs the React Refresh runtime, which is true for all our current projects. If we ever have a project that doesn't use React, we'll need to make this more flexible.
            import { injectIntoGlobalHook } from "/{{PROJECT}}/@react-refresh"
            injectIntoGlobalHook(window)
            window.$RefreshReg$ = () => {}
            window.$RefreshSig$ = () => (type) => type
        </script>
        <script type="module" src="/{{PROJECT}}/@vite/client"></script>
        <link rel="stylesheet" href="https://ourworldindata.org/fonts.css" />
        <link rel="stylesheet" href="/{{PROJECT}}/@fs{{DEMO_CSS}}" />
    </head>
    <body>
        <h1 class="project-title">{{PROJECT}}</h1>
        <p class="mode-note">
            Shadow DOM mode — CSS HMR does not work here.
            <a href="?shadowDom=false">Switch to no-shadow-DOM mode</a> for CSS
            hot reload.
        </p>
        <div id="demo-root"></div>
        <script type="module">
            import { mountBespokeComponentInShadow } from "/{{PROJECT}}/@fs{{SHARED_DIR}}/bespokeComponentShadowDom.ts"
            import { VARIANTS } from "/{{PROJECT}}/{{ENTRYPOINT_JS}}"

            const root = document.getElementById("demo-root")
            for (const variant of VARIANTS) {
                const wrapper = document.createElement("div")
                wrapper.className = "variant"
                wrapper.id = `variant--${variant.name}`

                const label = document.createElement("div")
                label.className = "variant-label"
                const prefix = document.createElement("span")
                prefix.className = "variant-label-prefix"
                prefix.textContent = "Variant:"
                const name = document.createElement("span")
                name.className = "variant-label-name"
                name.textContent = variant.name
                label.appendChild(prefix)
                label.appendChild(name)
                wrapper.appendChild(label)

                const container = document.createElement("div")
                wrapper.appendChild(container)
                root.appendChild(wrapper)

                mountBespokeComponentInShadow({
                    container,
                    scriptUrl: "/{{PROJECT}}/{{ENTRYPOINT_JS}}",
                    cssUrl: "/{{PROJECT}}/{{ENTRYPOINT_CSS}}",
                    variant: variant.name,
                    config: variant.demoConfig,
                })
            }
        </script>
    </body>
</html>
